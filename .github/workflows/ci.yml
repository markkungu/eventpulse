name: CI
on:
  pull_request:
    branches: [develop, main]
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eventpulse_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install poetry==1.8.2
      - run: poetry install --no-root
      - run: poetry run pytest --cov=app --cov-report=term-missing --cov-fail-under=70 -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/eventpulse_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          API_SECRET_KEY: test-secret-key
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
